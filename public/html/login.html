<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefanini | Quiz Challenge - Login</title>

    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <div class="container">
            <img src="../assets/logo.png" alt="Logo Stefanini" class="logo">
            <h2>Login</h2>
            <p class="subtitulo">Acesse o Quiz Challenge da Stefanini</p>

            <form id="loginForm">
                <div class="input-grupo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome_input" name="nome" placeholder="Insira seu nome" required>
                    <div id="erro_nome" class="erro"></div>
                </div>

                <div class="input-grupo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha_input" name="senha" placeholder="Digite sua senha" required>
                    <div id="erro_senha" class="erro"></div>
                </div>
                <button class="btn-login" type="button" onclick="entrar()">Entrar</button>
            </form>
        </div>
    </main>
</body>
<script>
    sessionStorage.NOME_USUARIO = nomeVar;
    sessionStorage.ID_USUARIO = json.insertId;

    function entrar() {
        erro_nome.innerHTML = '';
        erro_senha.innerHTML = '';

        var nomeVar = nome_input.value;
        var senhaVar = senha_input.value;

        let valid = true;

        if (nomeVar === '') {
            erro_nome.innerHTML = 'Insira um nome válido.';
            valid = false;
        }
        if (senhaVar === '') {
            erro_senha.innerHTML = 'Preencha o campo senha.';
            valid = false;
        } else if (senhaVar.length < 6) {
            erro_senha.innerHTML = 'A senha deve ter pelo menos 6 caracteres.';
            valid = false;
        }

        if (!valid) return;

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.ID_USUARIO = json.insertId;

                    window.location.href = "quiz.html";
                });
            } else {
                erro_nome.innerHTML = "Nome ou Senha inválidos!";
                erro_senha.innerHTML = "Nome ou Senha inválidos!";

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }
        }).catch(function (erro) {
            console.log(erro);
        })
        return false;
    }
</script>

</html>
