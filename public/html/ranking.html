<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefanini | Quiz Challenge - Ranking</title>

    <link rel="stylesheet" href="../css/ranking.css">
    <link rel="icon" href="../assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

</head>

<body>
    <main>
        <div class="container">
            <img src="../assets/logo.png" alt="Logo Stefanini" class="logo">
            <h2>Ranking</h2>
            <p class="subtitulo">Veja o ranking dos participantes do Quiz Challenge da Stefanini</p>

            <table id="rankingTable">
                <thead>
                    <tr>
                        <th>Posição</th>
                        <th>Nome</th>
                        <th>Pontuação</th>
                    </tr>
                </thead>
                <tbody id="rankingBody">

                </tbody>
            </table>

            <button class="btn-voltar" type="button" onclick="voltarParaLogin()">Voltar para o login</button>
        </div>
    </main>

    <script>
        const usuarioId = sessionStorage.ID_USUARIO;

        window.onload = function() {
            ranking();
        };

        function voltarParaLogin() {
            window.location.href = "login.html";
        }

        function ranking() {
            fetch(`/usuarios/ranquear/${usuarioId}`, {
                method: "GET"
            }).then(function (resposta) {
                if (resposta.ok) {
                    resposta.json().then(json => {
                        console.log(json);
                        exibirRanking(json);
                    });
                } else {
                    console.error("Erro ao buscar o ranking.");
                }
            }).catch(function (erro) {
                console.log(erro);
            });
        }

        function exibirRanking(ranking) {
            const tabela_ranking = document.getElementById('rankingBody');

            if (ranking && ranking.length > 0) {
                for (let i = 0; i < ranking.length; i++) {
                    const item = ranking[i];

                    tabela_ranking.innerHTML += `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${item.nome}</td>
                            <td>${item.pontuacao}</td>
                        </tr>
                    `;
                }
            } else {
                tabela_ranking.innerHTML = '<tr><td colspan="3">Nenhum dado de ranking encontrado.</td></tr>';
            }

        }
    </script>

</body>

</html>
